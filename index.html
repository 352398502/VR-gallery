<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR全景 最终修正版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 10001; display: flex; align-items: center; justify-content: center;
        }
        .auth-box { text-align: center; color: white; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input { padding: 12px; border-radius: 8px; border: none; margin: 20px 0; width: 220px; text-align: center; font-size: 16px; }
        button { padding: 12px 40px; background: #00d1b2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .vr-menu {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); padding: 20px; border-radius: 12px;
            color: white; width: 260px; display: none; border: 1px solid #333;
        }
        select { width: 100%; padding: 12px; background: #222; color: white; border: 1px solid #444; border-radius: 6px; margin-bottom: 12px; cursor: pointer; }
        #loading-ui { margin-top: 15px; text-align: center; }
        .progress-bar { width: 100%; background: #333; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 8px; display: none; }
        .progress-inner { width: 0%; height: 100%; background: #00d1b2; transition: width 0.3s; }
        #status-text { font-size: 12px; color: #00fa9a; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 VR 安全系统</h2>
            <input type="password" id="pass-input" placeholder="请输入授权密码" autofocus>
            <br><button onclick="unlock()">解锁进入</button>
            <p id="err-msg" style="color: #ff4757; font-size: 14px; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="vr-menu" id="main-menu">
        <h3 style="margin:0 0 15px 0; color:#00d1b2; text-align:center;">VR 项目导航</h3>
        <select id="lvl1"><option value="">选择区域</option></select>
        <select id="lvl2" disabled><option value="">选择目录</option></select>
        <select id="lvl3" disabled><option value="">选择点位</option></select>
        
        <div id="loading-ui">
            <div id="status-text">系统就绪</div>
            <div class="progress-bar" id="p-bar"><div class="progress-inner" id="p-inner"></div></div>
        </div>
    </div>

    <a-scene loading-screen="enabled: false">
        <a-sky id="main-sky" color="#000" rotation="0 -90 0"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const l3 = document.getElementById('lvl3');
        const sky = document.getElementById('main-sky');
        const statusText = document.getElementById('status-text');
        const pBar = document.getElementById('p-bar');
        const pInner = document.getElementById('p-inner');

        function unlock() {
            if (document.getElementById('pass-input').value === "zjvr") {
                // 【核心修正】：根据 image_bd2da9.png 最新的目录结构手动对齐路径
                const realData = {
                    "时间地点事件": {
                        "202310十一广东": {
                            "20231001_145635.jpg": "VR/时间地点事件/202310十一广东/20231001_145635.jpg"
                        },
                        "20230107重庆两江游船": {
                            "游船场景1": "VR/时间地点事件/20230107重庆两江游船/20230107_174542.jpg"
                        },
                        "202403-202404西双版纳": {
                            "版纳全景": "VR/时间地点事件/202403-202404西双版纳/您的文件名.jpg"
                        }
                    }
                };
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                initVR(realData);
            } else {
                document.getElementById('err-msg').innerText = "密码错误";
            }
        }

        function initVR(vrData) {
            for (let key in vrData) l1.options.add(new Option(key, key));

            l1.onchange = () => {
                l2.innerHTML = '<option value="">选择目录</option>';
                l3.innerHTML = ''; l2.disabled = !l1.value;
                if (l1.value) for (let key in vrData[l1.value]) l2.options.add(new Option(key, key));
            };

            l2.onchange = () => {
                l3.innerHTML = '<option value="">选择点位</option>';
                l3.disabled = !l2.value;
                if (l2.value) {
                    const scenes = vrData[l1.value][l2.value];
                    for (let name in scenes) l3.options.add(new Option(name, scenes[name]));
                }
            };

            l3.onchange = () => {
                if (!l3.value) return;
                
                // 显示加载进度
                pBar.style.display = 'block';
                pInner.style.width = '0%';
                statusText.innerText = "⏳ 正在下载高清全景图...";

                // 处理路径编码（解决中文路径无法访问的问题）
                const finalPath = encodeURI(l3.value);

                // 使用 XHR 获取图片以显示进度
                const xhr = new XMLHttpRequest();
                xhr.open('GET', finalPath, true);
                xhr.responseType = 'blob';

                xhr.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        pInner.style.width = percent + '%';
                        statusText.innerText = `已下载: ${Math.round(percent)}% (文件较大，请耐心等待)`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const imgUrl = URL.createObjectURL(xhr.response);
                        // 强制更新 A-Frame 素材
                        sky.setAttribute('src', ''); 
                        sky.setAttribute('src', imgUrl);
                        statusText.innerText = "✅ 全景渲染成功！可左右拖动视角";
                        pBar.style.display = 'none';
                    } else {
                        statusText.innerText = "❌ 文件不存在 (404)，请检查路径大小写";
                    }
                };

                xhr.onerror = () => { statusText.innerText = "❌ 加载失败，请检查网络或路径"; };
                xhr.send();
            };
        }
        document.getElementById('pass-input').addEventListener('keyup', (e) => { if (e.key === 'Enter') unlock(); });
    </script>
</body>
</html>
