<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR全景 缩略图导航版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 授权层样式 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 10001; display: flex; align-items: center; justify-content: center;
        }
        .auth-box { text-align: center; color: white; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        input { padding: 12px; border-radius: 8px; border: none; margin: 20px 0; width: 220px; text-align: center; font-size: 16px; background: #222; color: #fff; }
        button { padding: 12px 40px; background: #00d1b2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 顶部菜单：仅保留一级和二级切换 */
        .top-nav {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;
        }
        .top-nav select { background: #222; color: white; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; outline: none; }

        /* 底部缩略图栏：模仿 DM720 */
        #thumb-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 999; display: flex; gap: 15px; padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            border-radius: 12px; max-width: 90%; overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.1); display: none;
        }
        /* 隐藏滚动条但保留功能 */
        #thumb-bar::-webkit-scrollbar { display: none; }
        
        .thumb-item {
            flex: 0 0 100px; cursor: pointer; transition: all 0.3s; text-align: center;
        }
        .thumb-img {
            width: 100px; height: 60px; object-fit: cover; border-radius: 6px;
            border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .thumb-item:hover .thumb-img { transform: translateY(-5px); border-color: #00fa9a; }
        .thumb-item.active .thumb-img { border-color: #00d1b2; box-shadow: 0 0 15px #00d1b2; }
        .thumb-label {
            color: white; font-size: 11px; margin-top: 5px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; display: block;
        }

        #status-text {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            color: #00fa9a; font-size: 13px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 998; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 VR 安全系统</h2>
            <input type="password" id="pass-input" placeholder="请输入授权密码" autofocus>
            <br><button onclick="unlock()">解锁进入</button>
            <p id="err-msg" style="color: #ff4757;"></p>
        </div>
    </div>

    <div class="top-nav" id="top-nav" style="display:none;">
        <select id="lvl1"><option value="">选择分类</option></select>
        <select id="lvl2" disabled><option value="">选择目录</option></select>
    </div>

    <div id="thumb-bar"></div>
    <div id="status-text"></div>

    <a-scene loading-screen="enabled: false">
        <a-sky id="main-sky" rotation="0 -90 0" material="shader: flat; npot: true;"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        const l1 = document.getElementById('lvl1');
        const l2 = document.getElementById('lvl2');
        const thumbBar = document.getElementById('thumb-bar');
        const sky = document.getElementById('main-sky');
        const statusText = document.getElementById('status-text');

        function unlock() {
            if (document.getElementById('pass-input').value === "zjvr") {
                const realData = {
                    "时间地点事件": {
                        "202310十一广东": {
                            "全景画面_1": "VR/时间地点事件/202310十一广东/20231001_145635.jpg",
                            "备用视角": "https://aframe.io/aframe/examples/boilerplate/panorama/puydesancy.jpg"
                        },
                        "20230107重庆两江游船": {
                            "码头实拍": "VR/时间地点事件/20230107重庆两江游船/20230107_174542.jpg"
                        }
                    },
                    "时间流": {
                        "2024回顾": {
                            "示例场景": "https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg"
                        }
                    }
                };
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('top-nav').style.display = 'flex';
                thumbBar.style.display = 'flex';
                initVR(realData);
            } else {
                document.getElementById('err-msg').innerText = "密码错误";
            }
        }

        function initVR(vrData) {
            for (let key in vrData) l1.options.add(new Option(key, key));

            l1.onchange = () => {
                l2.innerHTML = '<option value="">选择目录</option>';
                l2.disabled = !l1.value;
                thumbBar.innerHTML = '';
                if (l1.value) for (let key in vrData[l1.value]) l2.options.add(new Option(key, key));
            };

            l2.onchange = () => {
                thumbBar.innerHTML = '';
                if (!l2.value) return;
                
                const scenes = vrData[l1.value][l2.value];
                for (let name in scenes) {
                    createThumbnail(name, scenes[name]);
                }
            };
        }

        function createThumbnail(name, url) {
            const item = document.createElement('div');
            item.className = 'thumb-item';
            
            // 缩略图逻辑：如果路径是本地的，我们直接用原图作为缩略图显示
            // 在生产环境下，建议另建一个 thumbs 文件夹存放小图以提升加载速度
            item.innerHTML = `
                <img class="thumb-img" src="${url}">
                <span class="thumb-label">${name}</span>
            `;
            
            item.onclick = () => {
                document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                loadPanorama(url);
            };
            
            thumbBar.appendChild(item);
        }

        function loadPanorama(url) {
            statusText.innerText = "⏳ 正在加载超清全景...";
            const img = new Image();
            img.crossOrigin = "anonymous";
            
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const MAX_WIDTH = 8192; // 关键兼容性限制
                
                if (img.width > MAX_WIDTH) {
                    canvas.width = MAX_WIDTH;
                    canvas.height = Math.floor(img.height * (MAX_WIDTH / img.width));
                } else {
                    canvas.width = img.width;
                    canvas.height = img.height;
                }

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                sky.setAttribute('src', canvas.toDataURL("image/jpeg", 0.85));
                statusText.innerText = "✅ 渲染完成";
                setTimeout(() => { statusText.innerText = ""; }, 2000);
            };
            
            img.src = encodeURI(url);
        }

        document.getElementById('pass-input').addEventListener('keyup', (e) => { if (e.key === 'Enter') unlock(); });
    </script>
</body>
</html>
