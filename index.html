<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR 分类浏览</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      /* 控制 UI 菜单的样式 */
      .menu-container {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 999;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        border-radius: 8px;
        color: white;
        font-family: sans-serif;
      }
      select {
        margin-top: 10px;
        padding: 5px;
        width: 100%;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div class="menu-container">
      <label>选择全景场景</label>
      <select id="scene-selector">
        <option value="20260416_123904_035.jpg">第一个全景场景 (客厅)</option>
        <option value="20250824_双江古镇.jpg">第二个全景场景 (卧室)</option>
        <option value="VR/时间地点事件/202310十一广东/IMG_20231001_173837.jpg">第三个全景场景 (厨房)</option>
      </select>
    </div>

    <a-scene>
      <a-assets>
        <img id="panorama" src="img/living-room/scene1.jpg">
      </a-assets>

      <a-sky id="main-sky" src="#panorama" rotation="0 -90 0"></a-sky>
    </a-scene>

    <script>
      // 获取下拉菜单和全景天空实体
      const selector = document.getElementById('scene-selector');
      const sky = document.getElementById('main-sky');

      // 监听菜单变化
      selector.addEventListener('change', function() {
        const imagePath = this.value;
        // 切换全景图路径
        sky.setAttribute('src', imagePath);
      });
    </script>
  </body>
</html>
